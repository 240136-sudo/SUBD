<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор группы</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        h2 { margin-top: 0; font-size: 1.2rem; }
        #myInfo { color: #666; margin-bottom: 15px; font-size: 0.9rem; }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
            border: 1px solid rgba(0,0,0,0.1);
        }

        button:hover { opacity: 0.9; }

        .btn-study { background-color: #28a745; }
        .btn-coffee { background-color: #ffc107; color: #000; }
        .btn-game { background-color: #17a2b8; }
        .btn-home { background-color: #6c757d; }

        .user-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 15px;
        }

        #groupList { margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Мой профиль</h2>
        <div id="myInfo">Загрузка профиля...</div>
        
        <div class="button-grid">
            <button class="btn-study" onclick="changeStatus('📚 Учусь', '#28a745')">📚 Учусь</button>
            <button class="btn-coffee" onclick="changeStatus('☕ Кофе', '#ffc107')">☕ Кофе</button>
            <button class="btn-game" onclick="changeStatus('🎮 В игре', '#17a2b8')">🎮 В игре</button>
            <button class="btn-home" onclick="changeStatus('🏠 Дома', '#6c757d')">🏠 Дома</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="groupList"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // ВСТАВЛЕНО: Твой новый URL проекта из сообщения
        const URL = 'https://utdywixvtzjsaqxtqxrt.supabase.co'; 
        
        // Ключ оставлен прежний, так как нового не было в сообщении
        const KEY = 'sb_publishable_ThtftS6uBeaKf8FyndIFtg_O0HMJ5yh'; 
        
        const supabase = createClient(URL, KEY);

        // ВСТАВЛЕНО: Твой новый UUID из скриншота
        const MY_ID = 'd50f580a-a6c7-4d32-ae6a-8e114d3e13a3'; 

        window.changeStatus = async (text, color) => {
            const { error } = await supabase
                .from('profiles')
                .update({ status: text, color: color })
                .eq('id', MY_ID);

            if (error) {
                alert("Ошибка! Проверьте RLS политики или ключи в Supabase.");
                console.error(error);
            } else {
                fetchGroup();
            }
        };

        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) return console.error(error);

            const list = document.getElementById('groupList');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div style="flex-grow: 1;">
                        <strong>${user.username}</strong><br>
                        <small style="color: #666;">${user.status || 'Статус не задан'}</small>
                    </div>
                </div>
            `).join('');

            const me = data.find(u => u.id === MY_ID);
            if (me) {
                document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
            }
        }

        fetchGroup();
        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
