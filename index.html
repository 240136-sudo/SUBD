<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов группы</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 25px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
            text-align: center;
        }

        h2 { margin-top: 0; color: #333; }
        #myInfo { margin-bottom: 20px; color: #666; font-size: 0.95rem; font-weight: bold; }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        button:hover { opacity: 0.85; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }

        .btn-study { background-color: #28a745; }
        .btn-coffee { background-color: #ffc107; color: #000; }
        .btn-game { background-color: #17a2b8; }
        .btn-home { background-color: #6c757d; }
        .btn-google { background-color: #4285F4; width: 100%; margin-bottom: 10px; }
        .btn-logout { background: none; color: #ff4444; border: none; font-size: 0.8rem; cursor: pointer; text-decoration: underline; margin-top: 10px; width: 100%; }

        .user-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
            background-color: #28a745; 
        }

        .user-details strong { font-size: 1.1rem; color: #222; }
        .user-details small { color: #777; font-size: 0.9rem; display: block; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Мой профиль</h2>
        <div id="authSection">
            <button class="btn-google" onclick="signIn()">Войти через Google</button>
        </div>
        
        <div id="profileSection" style="display: none;">
            <div id="myInfo">Загрузка...</div>
            <div class="button-grid">
                <button class="btn-study" onclick="changeStatus('📚 Учусь')">📚 Учусь</button>
                <button class="btn-coffee" onclick="changeStatus('☕ Кофе')">☕ Кофе</button>
                <button class="btn-game" onclick="changeStatus('🎮 В игре')">🎮 В игре</button>
                <button class="btn-home" onclick="changeStatus('🏠 Дома')">🏠 Дома</button>
            </div>
            <button class="btn-logout" onclick="signOut()">Выйти из аккаунта</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="groupList">Загрузка списка...</div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://utdywixvtzjsaqxtqxrt.supabase.co'; 
        const KEY = 'sb_publishable_6zjeZJ9xe6D41lPUqLgHug_MGno136_'; 

        const supabase = createClient(URL, KEY);

        // Функция входа
       window.signIn = async () => {
    await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
            // Обязательно добавь слэш в конце /SUBD/
            redirectTo: 'https://240136-sudo.github.io/SUBD/'
        }
    });
};

        // Функция выхода
        window.signOut = async () => {
            await supabase.auth.signOut();
            window.location.reload();
        };

        // Функция обновления статуса
        window.changeStatus = async (text) => {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return alert("Сначала войдите!");

            const { error } = await supabase
                .from('monitor') 
                .upsert({ 
                    id: user.id, 
                    username: user.user_metadata.full_name || user.email, 
                    status: text 
                });

            if (error) {
                alert("Ошибка! Проверь политики RLS в Supabase.");
                console.error(error);
            } else {
                fetchGroup(); 
            }
        };

        // Получение списка
        async function fetchGroup() {
            const { data, error } = await supabase
                .from('monitor')
                .select('*')
                .order('username', { ascending: true });

            if (error) return;

            const list = document.getElementById('groupList');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot"></div>
                    <div class="user-details">
                        <strong>${user.username}</strong>
                        <small>${user.status || 'Статус не задан'}</small>
                    </div>
                </div>
            `).join('');
        }

        // Следим за авторизацией
        supabase.auth.onAuthStateChange((event, session) => {
            const authSection = document.getElementById('authSection');
            const profileSection = document.getElementById('profileSection');
            const myInfo = document.getElementById('myInfo');

            if (session) {
                authSection.style.display = 'none';
                profileSection.style.display = 'block';
                myInfo.innerText = `Вы вошли как: ${session.user.user_metadata.full_name || session.user.email}`;
            } else {
                authSection.style.display = 'block';
                profileSection.style.display = 'none';
            }
            fetchGroup();
        });

        // Интервал обновления
        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
