<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов группы</title>
    <style>
        /* CSS: Оформление как на твоих скриншотах */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 25px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
            text-align: center;
        }

        h2 { margin-top: 0; color: #333; }
        #myInfo { margin-bottom: 20px; color: #666; font-size: 0.95rem; }

        /* Сетка кнопок 2x2 */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        button:hover { opacity: 0.85; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }

        /* Цвета кнопок */
        .btn-study { background-color: #28a745; }
        .btn-coffee { background-color: #ffc107; color: #000; }
        .btn-game { background-color: #17a2b8; }
        .btn-home { background-color: #6c757d; }

        /* Стили списка пользователей */
        .user-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        .user-item:last-child { border-bottom: none; }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .user-details strong { font-size: 1.1rem; color: #222; }
        .user-details small { color: #777; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Мой профиль</h2>
        <div id="myInfo">Загрузка данных профиля...</div>
        
        <div class="button-grid">
            <button class="btn-study" onclick="changeStatus('📚 Учусь', '#28a745')">📚 Учусь</button>
            <button class="btn-coffee" onclick="changeStatus('☕ Кофе', '#ffc107')">☕ Кофе</button>
            <button class="btn-game" onclick="changeStatus('🎮 В игре', '#17a2b8')">🎮 В игре</button>
            <button class="btn-home" onclick="changeStatus('🏠 Дома', '#6c757d')">🏠 Дома</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="groupList">
            </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // --- ДАННЫЕ С ТВОИХ СКРИНШОТОВ ---
        // 1. Твой URL проекта
        const URL = 'https://utdywixvtzjsaqxtqxrt.supabase.co'; 
        // 2. Твой ANON KEY
        const KEY = 'sb_publishable_ThtftS6uBeaKf8FyndIFtg_O0HMJ5yh'; 
        // 3. Твой личный ID из таблицы monitor
        const MY_ID = 'd50f580a-a6c7-4d32-ae6a-8e114d3e13a3'; 

        const supabase = createClient(URL, KEY);

        // Функция обновления твоего статуса
        window.changeStatus = async (text, color) => {
            const { error } = await supabase
                .from('monitor') // Имя таблицы со скринов RLS
                .update({ status: text, color: color })
                .eq('id', MY_ID);

            if (error) {
                alert("Ошибка! Проверь настройки RLS или название таблицы.");
                console.error("Ошибка обновления:", error);
            } else {
                fetchGroup(); // Сразу обновляем список после нажатия
            }
        };

        // Функция получения данных всей группы
        async function fetchGroup() {
            const { data, error } = await supabase
                .from('monitor') // Имя таблицы со скринов RLS
                .select('*')
                .order('username', { ascending: true });

            if (error) {
                console.error("Ошибка загрузки:", error);
                return;
            }

            const list = document.getElementById('groupList');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div class="user-details">
                        <strong>${user.username}</strong>
                        <small>${user.status || 'Статус не задан'}</small>
                    </div>
                </div>
            `).join('');

            // Находим тебя в списке, чтобы обновить приветствие
            const me = data.find(u => u.id === MY_ID);
            if (me) {
                document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
            }
        }

        // Запускаем при открытии страницы
        fetchGroup();

        // Авто-обновление каждые 5 секунд (синхронизация с другими)
        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
