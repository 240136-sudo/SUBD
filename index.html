<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов группы</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 25px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        h2 { margin-top: 0; color: #333; font-size: 1.3rem; }
        #myInfo { margin-bottom: 15px; color: #111; font-size: 1.2rem; font-weight: bold; }
        
        .timer-container {
            font-size: 1.8rem;
            font-weight: bold;
            color: #007bff;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .main-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            margin-bottom: 12px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
        }
        .btn-stop { background-color: #dc3545; }
        .btn-start { background-color: #28a745; }

        .sub-button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button.sub-btn {
            border: none;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
        }

        button:hover { opacity: 0.85; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }

        .btn-coffee { background-color: #ffc107; color: #000; }
        .btn-exit { background-color: #6c757d; }
        .btn-google { background-color: #4285F4; width: 100%; color: white; font-weight: bold; padding: 15px; border-radius: 10px; border: none; cursor: pointer;}
        
        /* Список группы */
        .user-item {
            display: flex;
            align-items: center;
            padding: 12px 5px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }
        .user-item:last-child { border-bottom: none; }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
            background-color: #9e9e9e;
            transition: background-color 0.3s;
        }
        .status-dot.online {
            background-color: #28a745;
            box-shadow: 0 0 8px rgba(40, 167, 69, 0.5);
        }

        .user-details {
            flex-grow: 1;
        }
        .user-details strong { font-size: 1.05rem; color: #222; display: block; }
        .user-details small { color: #007bff; font-size: 0.85rem; margin-top: 2px; display: block; }
        
        .user-meta {
            text-align: right;
            font-size: 0.85rem;
            color: #666;
        }
        .user-meta .status-text { font-weight: bold; color: #333; display: block;}

        /* Стили Общего Чата */
        .chat-container {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            text-align: left;
        }
        .chat-messages {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            height: 160px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }
        .chat-message {
            margin-bottom: 8px;
            line-height: 1.4;
            word-break: break-word;
        }
        .chat-input-wrapper {
            display: flex;
            gap: 8px;
        }
        .chat-input {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
        }
        .chat-send-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0 16px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="authSection">
            <h2>Авторизация</h2>
            <button class="btn-google" onclick="signIn()">Войти через Google</button>
        </div>
        
        <div id="profileSection" style="display: none;">
            <div id="myInfo">Загрузка...</div>
            
            <div class="timer-container" id="timerBlock" style="display: none;">
                ⏱️ <span id="sessionTimer">00 сек.</span>
            </div>

            <button id="mainStateBtn" class="main-btn btn-start" onclick="toggleStudy()">
                📚 Начать учебу
            </button>

            <div class="sub-button-grid">
                <button class="sub-btn btn-coffee" onclick="setBreak()">☕ Перерыв</button>
                <button class="sub-btn btn-exit" onclick="signOut()">Выход</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>👥 Монитор группы</h2>
        <div id="groupList">Загрузка списка...</div>
    </div>

    <div class="card">
        <h2>💬 Общий чат</h2>
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">Загрузка чата...</div>
            <div class="chat-input-wrapper">
                <input type="text" id="chatInput" class="chat-input" placeholder="Сообщение..." disabled>
                <button id="chatSendBtn" class="chat-send-btn" onclick="sendMessage()" disabled>➤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://utdywixvtzjsaqxtqxrt.supabase.co'; 
        const KEY = 'sb_publishable_6zjeZJ9xe6D41lPUqLgHug_MGno136_'; 

        const supabase = createClient(URL, KEY);

        let currentUser = null;
        let isStudyingLocal = false;
        let studyStartedAtLocal = null;
        let timerInterval = null;

        window.signIn = async () => {
            try {
                await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: 'https://240136-sudo.github.io/SUBD/' }
                });
            } catch (err) { console.error(err); }
        };

        window.signOut = async () => {
            clearInterval(timerInterval);
            if (currentUser) {
                try {
                    await supabase.from('monitor').upsert({ id: currentUser.id, is_studying: false, status: '💤 Не в сети' });
                } catch (e) { console.error(e); }
            }
            await supabase.auth.signOut();
            window.location.reload();
        };

        window.toggleStudy = async () => {
            if (!currentUser) return alert("Сначала войдите!");
            clearInterval(timerInterval);

            const name = currentUser.user_metadata.full_name || currentUser.email;

            try {
                if (!isStudyingLocal) {
                    const startTime = new Date().toISOString();
                    await supabase.from('monitor').upsert({ 
                        id: currentUser.id, 
                        username: name, 
                        status: '📚 В учебе',
                        is_studying: true,
                        study_started_at: startTime,
                        last_seen: new Date().toISOString()
                    });
                    isStudyingLocal = true;
                    studyStartedAtLocal = startTime;
                } else {
                    await supabase.from('monitor').upsert({ 
                        id: currentUser.id, 
                        username: name, 
                        status: '🏠 Дома',
                        is_studying: false,
                        study_started_at: null,
                        last_seen: new Date().toISOString()
                    });
                    isStudyingLocal = false;
                    studyStartedAtLocal = null;
                }
                updateMyUI();
                fetchGroup();
            } catch(e) { console.error(e); }
        };

        window.setBreak = async () => {
            if (!currentUser) return alert("Сначала войдите!");
            clearInterval(timerInterval);
            isStudyingLocal = false;
            studyStartedAtLocal = null;

            try {
                await supabase.from('monitor').upsert({ 
                    id: currentUser.id, 
                    username: currentUser.user_metadata.full_name || currentUser.email, 
                    status: '☕ Перерыв',
                    is_studying: false,
                    study_started_at: null,
                    last_seen: new Date().toISOString()
                });
                updateMyUI();
                fetchGroup();
            } catch(e) { console.error(e); }
        };

        async function sendPing() {
            if (!currentUser) return;
            try {
                await supabase.from('monitor').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id);
            } catch(e) {}
        }

        function updateMyUI() {
            const mainBtn = document.getElementById('mainStateBtn');
            const timerBlock = document.getElementById('timerBlock');

            clearInterval(timerInterval);

            if (isStudyingLocal && studyStartedAtLocal) {
                if (mainBtn) {
                    mainBtn.innerText = "🛑 Завершить сессию";
                    mainBtn.className = "main-btn btn-stop";
                }
                if (timerBlock) timerBlock.style.display = "flex";

                timerInterval = setInterval(() => {
                    const diffMs = new Date() - new Date(studyStartedAtLocal);
                    const timerElement = document.getElementById('sessionTimer');
                    if (timerElement) timerElement.innerText = formatTime(diffMs);
                }, 1000);
            } else {
                if (mainBtn) {
                    mainBtn.innerText = "📚 Начать учебу";
                    mainBtn.className = "main-btn btn-start";
                }
                if (timerBlock) timerBlock.style.display = "none";
            }
        }

        function formatTime(ms) {
            if (!ms || ms < 0) return "0 сек.";
            const totalSecs = Math.floor(ms / 1000);
            const hours = Math.floor(totalSecs / 3600);
            const minutes = Math.floor((totalSecs % 3600) / 60);
            const seconds = totalSecs % 60;

            if (hours > 0) return `${hours}ч ${minutes}м ${seconds}с`;
            if (minutes > 0) return `${minutes}м ${seconds}с`;
            return `${seconds} сек.`;
        }

        async function fetchGroup() {
            const list = document.getElementById('groupList');
            if (!list) return;

            try {
                const { data, error } = await supabase
                    .from('monitor')
                    .select('*')
                    .order('username', { ascending: true });

                if (error) {
                    list.innerText = "Ошибка загрузки списка групп.";
                    return;
                }

                const now = new Date();
                if (!data || data.length === 0) {
                    list.innerText = "Список группы пуст.";
                    return;
                }

                list.innerHTML = data.map(user => {
                    const lastSeenDate = user.last_seen ? new Date(user.last_seen) : null;
                    const isOnline = lastSeenDate && (now - lastSeenDate < 60000); 
                    const statusDotClass = isOnline ? 'status-dot online' : 'status-dot';

                    let studyTimeText = '';
                    if (user.is_studying && user.study_started_at) {
                        const diff = now - new Date(user.study_started_at);
                        studyTimeText = `⏱️ ${formatTime(diff)}`;
                    }

                    return `
                        <div class="user-item">
                            <div class="${statusDotClass}"></div>
                            <div class="user-details">
                                <strong>${user.username}</strong>
                                <small>${studyTimeText || ''}</small>
                            </div>
                            <div class="user-meta">
                                <span class="status-text">${user.status || '🏠 Дома'}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { list.innerText = "Ошибка."; }
        }

        async function fetchMessages() {
            const chatBox = document.getElementById('chatMessages');
            if (!chatBox) return;

            try {
                const { data, error } = await supabase
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: true })
                    .limit(50);

                if (error) {
                    chatBox.innerText = "Создайте таблицу 'messages' в БД.";
                    return;
                }

                if (!data || data.length === 0) {
                    chatBox.innerText = "Сообщений пока нет.";
                    return;
                }

                chatBox.innerHTML = data.map(msg => `
                    <div class="chat-message">
                        <strong>${msg.username}:</strong> ${msg.text}
                    </div>
                `).join('');
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) { chatBox.innerText = "Ошибка чата."; }
        }

        window.sendMessage = async () => {
            const input = document.getElementById('chatInput');
            if (!input || !input.value.trim() || !currentUser) return;

            const txt = input.value.trim();
            input.value = '';

            try {
                await supabase.from('messages').insert({
                    user_id: currentUser.id,
                    username: currentUser.user_metadata.full_name || currentUser.email,
                    text: txt
                });
                fetchMessages();
            } catch(e) {}
        };

        document.getElementById('chatInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        supabase.auth.onAuthStateChange(async (event, session) => {
            const authSection = document.getElementById('authSection');
            const profileSection = document.getElementById('profileSection');
            const myInfo = document.getElementById('myInfo');
            const chatInput = document.getElementById('chatInput');
            const chatSendBtn = document.getElementById('chatSendBtn');

            if (session) {
                currentUser = session.user;
                if (authSection) authSection.style.display = 'none';
                if (profileSection) profileSection.style.display = 'block';
                
                const name = session.user.user_metadata.full_name || session.user.email;
                if (myInfo) myInfo.innerText = name;
                if (chatInput) chatInput.disabled = false;
                if (chatSendBtn) chatSendBtn.disabled = false;

                try {
                    const { data } = await supabase.from('monitor').select('*').eq('id', currentUser.id);
                    if (data && data.length > 0) {
                        isStudyingLocal = data[0].is_studying || false;
                        studyStartedAtLocal = data[0].study_started_at || null;
                    } else {
                        // Авто-регистрация юзера в таблице при первом входе
                        await supabase.from('monitor').insert({
                            id: currentUser.id,
                            username: name,
                            status: '🏠 Дома',
                            is_studying: false
                        });
                    }
                } catch(err) {}
                updateMyUI();
            } else {
                currentUser = null;
                if (authSection) authSection.style.display = 'block';
                if (profileSection) profileSection.style.display = 'none';
                if (chatInput) chatInput.disabled = true;
                if (chatSendBtn) chatSendBtn.disabled = true;
                clearInterval(timerInterval);
            }
            fetchGroup();
            fetchMessages();
        });

        setInterval(fetchGroup, 5000); 
        setInterval(fetchMessages, 4000);
        setInterval(sendPing, 30000);   
    </script>
</body>
</html>
